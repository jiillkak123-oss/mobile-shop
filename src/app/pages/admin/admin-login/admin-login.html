<div class="admin-login-container">
  <div class="login-box">
    <h1>Admin Login</h1>
    
    <!-- Error Message Display -->
    <div *ngIf="errorMessage" class="error-message">
      <span class="error-icon">⚠️</span>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" (keydown)="onKeyDown($event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          id="email"
          type="email" 
          formControlName="email" 
          placeholder="Enter admin email"
          autocomplete="email"
          [disabled]="loading"
        />
        <div *ngIf="loginForm.get('email')?.touched && emailErrors" class="input-error">
          <small *ngIf="emailErrors['required']">Email is required</small>
          <small *ngIf="emailErrors['email']">Please enter a valid email address</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password"
          type="password" 
          formControlName="password" 
          placeholder="Enter password"
          autocomplete="current-password"
          [disabled]="loading"
        />
        <div *ngIf="loginForm.get('password')?.touched && passwordErrors" class="input-error">
          <small *ngIf="passwordErrors['required']">Password is required</small>
          <small *ngIf="passwordErrors['minlength']">Password must be at least 6 characters</small>
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading" class="login-btn">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">
          <span class="spinner"></span>
          Logging in...
        </span>
      </button>
    </form>

    <div class="admin-links">
      <p class="register-link">
        Not registered as admin?
        <a routerLink="/admin/register">Register here</a>
      </p>
    </div>
  </div>
</div>
