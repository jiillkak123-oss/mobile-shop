<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>

    <form (ngSubmit)="register()">
      <div class="input-group">
        <input type="text" [(ngModel)]="name" name="name" placeholder="Enter Full Name" required />
      </div>

      <div class="input-group">
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter Email" required />
      </div>

      <div class="input-group">
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter Password" required />
      </div>

      <div class="input-group">
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required />
      </div>

      <button type="submit" [disabled]="loading">{{ loading ? 'Registering...' : 'Register' }}</button>
    </form>

    <p class="redirect">
      Already have an account?
      <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
