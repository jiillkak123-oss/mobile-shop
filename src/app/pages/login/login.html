<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>

    <!-- Server Error Message -->
    <div *ngIf="serverError" class="error-message">
      <span class="error-icon">⚠️</span>
      <span>{{ serverError }}</span>
    </div>

    <!-- Form Validation Error Message -->
    <div *ngIf="errorMessage" class="error-message">
      <span class="error-icon">⚠️</span>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="input-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          formControlName="email" 
          placeholder="Enter Email"
          [disabled]="loading"
        />
        <div *ngIf="loginForm.get('email')?.touched && emailErrors" class="input-error">
          <small *ngIf="emailErrors['required']">Email is required</small>
          <small *ngIf="emailErrors['email']">Please enter a valid email address</small>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          formControlName="password" 
          placeholder="Enter Password"
          [disabled]="loading"
        />
        <div *ngIf="loginForm.get('password')?.touched && passwordErrors" class="input-error">
          <small *ngIf="passwordErrors['required']">Password is required</small>
          <small *ngIf="passwordErrors['minlength']">Password must be at least 6 characters</small>
        </div>
      </div>
      
      <button type="submit" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">Logging in...</span>
      </button>
    </form>

    <p class="redirect">
      Don't have an account?
      <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
